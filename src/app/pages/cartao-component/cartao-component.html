<mat-toolbar>
  <span>Novo cartão</span>
  <span class="espacamento-botoes"></span>
  <button mat-raised-button color="primary" class="botoes-toolbar">Salvar</button>
  <button mat-raised-button>Cancelar</button>
</mat-toolbar>
<mat-divider></mat-divider>
<div class="container">
    <div class="campo">
        <mat-form-field appearance="fill">
        <mat-label>Bandeira</mat-label>
            <mat-select>
                <mat-option value="one">Master Card</mat-option>
                <mat-option value="two">Visa</mat-option>
            </mat-select>
        </mat-form-field>
    </div>
     <div class="campo">
        <mat-form-field appearance="fill">
        <mat-label>Banco</mat-label>
            <mat-select>
                <mat-option value="one">Caixa economica</mat-option>
                <mat-option value="two">Bradesco</mat-option>
                <mat-option value="two">Santander</mat-option>
            </mat-select>
        </mat-form-field>
    </div>
    <div class="campo">
        <mat-form-field appearance="fill">
        <mat-label>Fechamento</mat-label>
            <input matInput>
        </mat-form-field>
    </div>
    <div class="campo">
        <mat-form-field appearance="fill">
        <mat-label>Vencimento</mat-label>
            <input matInput>
        </mat-form-field>
    </div>
    
</div>
<div class="container">
    <div class="campo">
        <mat-form-field class="campo-descricao"  appearance="fill">
            <mat-label>Descrição</mat-label>
            <input matInput>
        </mat-form-field>
    </div>
    <div class="campo">
        <mat-form-field appearance="fill">
        <mat-label>Limite</mat-label>
            <input matInput>
        </mat-form-field>
    </div>
</div>
