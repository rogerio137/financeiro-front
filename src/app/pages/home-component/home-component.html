
  <mat-toolbar>
    <button type="button" mat-button (click)="drawer.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <span>My Application</span>
    <span class="espacamento-botoes"></span>
    <img src="assets/altair.jpg" class="img-usuario">
  </mat-toolbar>
<mat-drawer-container class="inicial-container">
  <mat-drawer #drawer class= "menu-lateral" mode="side" close>
    <h3 matSubheader>Menu</h3>
    <mat-nav-list>
      @for (link of fragments; track link) {
          <a
            mat-list-item
            [routerLink]="link.route"
            routerLinkActive="active" 
            [activated]="activeLink===link.title"
            href="#{{link}}"
            (click)="$event.preventDefault(); activeLink=link.title;"
          >
              <mat-icon matListItemIcon>{{ link.icon }}</mat-icon>
              <span matListItemTitle>{{ link.title| titlecase}}</span>
          </a>
      }
    </mat-nav-list>
  </mat-drawer>
  <mat-drawer-content>
    <router-outlet></router-outlet>
  </mat-drawer-content>
</mat-drawer-container>
