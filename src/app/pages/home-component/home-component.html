
  <mat-toolbar>
    <button type="button" mat-button (click)="drawer.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <span>My Application</span>
    <span class="espacamento-botoes"></span>
    <img src="assets/altair.jpg" class="img-usuario">
  </mat-toolbar>
<mat-drawer-container class="inicial-container">
  <mat-drawer #drawer class= "menu-lateral" mode="side" close>
    <h3 matSubheader>Menu</h3>
    <mat-nav-list>
      @for (link of fragments; track link) {
    <a
      mat-list-item
      [activated]="activeLink===link"
      href="#{{link}}"
      (click)="$event.preventDefault(); activeLink=link;"
    >
      <mat-icon matListItemIcon>folder</mat-icon>
      <span matListItemTitle>{{ link | titlecase}}</span>
      <div matListItemMeta>
        <mat-icon>{{link}}</mat-icon>
      </div>
    </a>
  }
    </mat-nav-list>
  </mat-drawer>
  <mat-drawer-content>
  </mat-drawer-content>
</mat-drawer-container>
